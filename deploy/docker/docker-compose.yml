version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: gopherai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: gopherai123
      MYSQL_DATABASE: GopherAI
      MYSQL_USER: gopherai
      MYSQL_PASSWORD: gopherai123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gopherai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Master
  redis-master:
    image: redis:7-alpine
    container_name: gopherai-redis-master
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --rdbcompression yes
      --dbfilename dump.rdb
      --dir /data
    ports:
      - "6379:6379"
    volumes:
      - redis_master_data:/data
    networks:
      - gopherai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Slave (从节点，自动同步主节点数据)
  redis-slave:
    image: redis:7-alpine
    container_name: gopherai-redis-slave
    restart: unless-stopped
    command: >
      redis-server
      --replicaof gopherai-redis-master 6379
      --appendonly yes
      --appendfsync everysec
      --rdbcompression yes
      --dbfilename dump.rdb
      --dir /data
      --readonly
      --replica-read-only yes
    ports:
      - "6380:6379"
    volumes:
      - redis_slave_data:/data
    networks:
      - gopherai-network
    depends_on:
      - redis-master
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "gopherai-redis-master", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Sentinel (哨兵，自动故障转移)
  redis-sentinel:
    image: redis:7-alpine
    container_name: gopherai-redis-sentinel
    restart: unless-stopped
    command: >
      redis-sentinel
      --sentinel monitor mymaster gopherai-redis-master 6379 2
      --sentinel down-after-milliseconds mymaster 5000
      --sentinel failover-timeout mymaster 10000
      --sentinel parallel-syncs mymaster 1
    ports:
      - "26379:26379"
    volumes:
      - redis_sentinel_data:/data
    networks:
      - gopherai-network
    depends_on:
      - redis-master
      - redis-slave

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: gopherai-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - gopherai-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    container_name: gopherai-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      redis-sentinel:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    ports:
      - "9091:9090"
    volumes:
      - ../../config/config.docker.toml:/root/config/config.toml:ro
      - ../../docs:/root/docs:ro
    networks:
      - gopherai-network
    environment:
      - GIN_MODE=release
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务
  frontend:
    build:
      context: ../../vue-frontend
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: gopherai-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - gopherai-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
  redis_master_data:
  redis_slave_data:
  redis_sentinel_data:
  rabbitmq_data:

networks:
  gopherai-network:
    driver: bridge
