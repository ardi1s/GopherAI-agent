apiVersion: v1
kind: ConfigMap
metadata:
  name: gopherai-config
  namespace: gopherai
data:
  config.toml: |
    [mainConfig]
    appName = "GopherAI"
    host = "0.0.0.0"
    port = 9090

    [emailConfig]
    authcode = "${EMAIL_AUTHCODE}"
    email = "${EMAIL_ADDRESS}"

    [redisConfig]
    host = "gopherai-redis"
    port = 6379
    password = "${REDIS_PASSWORD}"
    db = 0

    [mysqlConfig]
    host = "gopherai-mysql"
    port = 3306
    user = "${MYSQL_USER}"
    password = "${MYSQL_PASSWORD}"
    databaseName = "${MYSQL_DATABASE}"
    charset = "utf8mb4"

    [jwtConfig]
    expire_duration = 8760
    issuer = "huanheart"
    subject = "GopherAI"
    key = "${JWT_SECRET_KEY}"

    [rabbitmqConfig]
    host = "gopherai-rabbitmq"
    port = 5672
    username = "${RABBITMQ_USER}"
    password = "${RABBITMQ_PASSWORD}"
    vhost = "/"

    [ragModelConfig]
    embeddingModel = "text-embedding-v2"
    chatModelName = "qwen3.5-plus"
    docDir = "./docs"
    baseUrl = "https://dashscope.aliyuncs.com/compatible-mode/v1"
    dimension = 1536
    apiKey = "${DASHSCOPE_API_KEY}"

    [voiceServiceConfig]
    voiceServiceApiKey = "${BAIDU_API_KEY}"
    voiceServiceSecretKey = "${BAIDU_SECRET_KEY}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gopherai-nginx-config
  namespace: gopherai
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://gopherai-backend:9090/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
