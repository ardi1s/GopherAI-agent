apiVersion: apps/v1
kind: Deployment
metadata:
  name: gopherai-backend
  namespace: gopherai
  labels:
    app: gopherai-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gopherai-backend
  template:
    metadata:
      labels:
        app: gopherai-backend
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z gopherai-mysql 3306; do
                echo "Waiting for MySQL..."
                sleep 2
              done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z gopherai-redis 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z gopherai-rabbitmq 5672; do
                echo "Waiting for RabbitMQ..."
                sleep 2
              done
      containers:
        - name: backend
          image: gopherai/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          env:
            - name: GIN_MODE
              value: "release"
            - name: EMAIL_AUTHCODE
              valueFrom:
                secretKeyRef:
                  name: gopherai-secrets
                  key: EMAIL_AUTHCODE
            - name: EMAIL_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: gopherai-secrets
                  key: EMAIL_ADDRESS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gopherai-secrets
                  key: REDIS_PASSWORD
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: gopherai-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gopherai-secrets
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: gopherai-secrets
                  key: MYSQL_DATABASE
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gopherai-secrets
                  key: JWT_SECRET_KEY
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: gopherai-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gopherai-secrets
                  key: RABBITMQ_PASSWORD
            - name: DASHSCOPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gopherai-secrets
                  key: DASHSCOPE_API_KEY
            - name: BAIDU_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gopherai-secrets
                  key: BAIDU_API_KEY
            - name: BAIDU_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gopherai-secrets
                  key: BAIDU_SECRET_KEY
          volumeMounts:
            - name: config
              mountPath: /root/config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: gopherai-config
---
apiVersion: v1
kind: Service
metadata:
  name: gopherai-backend
  namespace: gopherai
spec:
  selector:
    app: gopherai-backend
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gopherai-backend-hpa
  namespace: gopherai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gopherai-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
