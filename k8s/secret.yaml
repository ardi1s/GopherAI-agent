apiVersion: v1
kind: Secret
metadata:
  name: gopherai-secrets
  namespace: gopherai
type: Opaque
stringData:
  # MySQL 配置
  MYSQL_ROOT_PASSWORD: "change-me-root-password"
  MYSQL_USER: "gopherai"
  MYSQL_PASSWORD: "change-me-user-password"
  MYSQL_DATABASE: "GopherAI"

  # Redis 配置
  REDIS_PASSWORD: ""

  # RabbitMQ 配置
  RABBITMQ_USER: "admin"
  RABBITMQ_PASSWORD: "change-me-rabbitmq-password"

  # JWT 配置
  JWT_SECRET_KEY: "change-me-jwt-secret-key"

  # 邮件配置
  EMAIL_AUTHCODE: "your-email-auth-code"
  EMAIL_ADDRESS: "your-email@qq.com"

  # AI 服务配置
  DASHSCOPE_API_KEY: "your-dashscope-api-key"
  BAIDU_API_KEY: "your-baidu-api-key"
  BAIDU_SECRET_KEY: "your-baidu-secret-key"
