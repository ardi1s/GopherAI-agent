apiVersion: apps/v1
kind: Deployment
metadata:
  name: gopherai-frontend
  namespace: gopherai
  labels:
    app: gopherai-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gopherai-frontend
  template:
    metadata:
      labels:
        app: gopherai-frontend
    spec:
      containers:
        - name: frontend
          image: gopherai/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: nginx-config
          configMap:
            name: gopherai-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: gopherai-frontend
  namespace: gopherai
spec:
  selector:
    app: gopherai-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gopherai-frontend-hpa
  namespace: gopherai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gopherai-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
